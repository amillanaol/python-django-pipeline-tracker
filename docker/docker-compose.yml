services:
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "${PORT:-8181}:${PORT:-8181}"
    env_file:
      - ../.env
    environment:
      - DB_HOST=db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: >
      sh -c "python manage.py migrate &&
             gunicorn src.infrastructure.django_app.wsgi:application --bind 0.0.0.0:${PORT:-8181} --workers 3"

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=pipeline_tracker
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  celery:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: celery -A src.infrastructure.django_app.celery worker --loglevel=info
    env_file:
      - ../.env
    environment:
      - DB_HOST=db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  postgres_data:
